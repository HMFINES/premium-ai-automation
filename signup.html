<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ELEVATEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }

        .signup-card {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .signup-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .signup-logo svg {
            width: 50px;
            height: 50px;
        }

        .signup-logo .logo-text {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text-primary);
        }

        .signup-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .signup-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .signup-header p a {
            color: var(--primary);
            text-decoration: none;
        }

        .signup-header p a:hover {
            text-decoration: underline;
        }

        .signup-form .form-group {
            margin-bottom: 20px;
        }

        .signup-form label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .signup-form input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .signup-form input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.05);
        }

        .signup-form input::placeholder {
            color: var(--text-muted);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .signup-submit {
            width: 100%;
            padding: 18px 30px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--bg-dark);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .signup-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .divider span {
            padding: 0 15px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .social-signup {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: var(--primary);
            background: var(--primary-dim);
        }

        .terms {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .back-home:hover {
            color: var(--primary);
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ff5f57;
        }

        .strength-fill.medium {
            width: 66%;
            background: #febc2e;
        }

        .strength-fill.strong {
            width: 100%;
            background: var(--accent);
        }

        .strength-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <!-- Background Effects -->
    <div class="bg-effects">
        <canvas id="neuralGrid"></canvas>
        <div class="particles-container" id="particlesContainer"></div>
        <div class="holographic-waves"></div>
        <div class="scan-lines"></div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <a href="index.html" class="back-home">
        ← Back to Home
    </a>

    <div class="signup-page">
        <div class="signup-container">
            <div class="signup-card glass-card">
                <div class="signup-header">
                    <div class="signup-logo">
                        <svg viewBox="0 0 40 40" class="logo-icon">
                            <circle cx="20" cy="20" r="15" class="logo-ring" />
                            <circle cx="20" cy="20" r="10" class="logo-ring" />
                            <path d="M12 12 L20 20 L28 12" class="logo-x" />
                            <path d="M12 28 L20 20 L28 28" class="logo-x" />
                        </svg>
                        <span class="logo-text">ELEVATEX</span>
                    </div>
                    <h1>Create Account</h1>
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>

                <form class="signup-form" id="signupForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required placeholder="Doe">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                    </div>

                    <div class="form-group">
                        <label for="company">Company Name</label>
                        <input type="text" id="company" name="company" placeholder="Your Company">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required
                            placeholder="Create a strong password">
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-text" id="strengthText"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                            placeholder="Confirm your password">
                    </div>

                    <button type="submit" class="signup-submit">
                        Create Account
                    </button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <div class="social-signup">
                        <button type="button" class="social-btn" data-oauth-provider="google">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            Google
                        </button>
                        <button type="button" class="social-btn" data-oauth-provider="github">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                            </svg>
                            GitHub
                        </button>
                    </div>

                    <p class="terms">
                        By signing up, you agree to our
                        <a href="#">Terms of Service</a> and
                        <a href="#">Privacy Policy</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth-client.js"></script>
    <script>
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function () {
            const password = this.value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthFill.className = 'strength-fill';

            if (password.length === 0) {
                strengthText.textContent = '';
            } else if (strength <= 1) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Weak password';
            } else if (strength <= 2) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'Medium strength';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Strong password';
            }
        });

        // Form submission
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = this.querySelector('.signup-submit');

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            submitBtn.textContent = 'Creating account...';
            submitBtn.style.background = 'var(--accent)';
            submitBtn.disabled = true;

            try {
                const authData = await ElevatexAuth.requestJson('/auth/signup', {
                    firstName: document.getElementById('firstName').value.trim(),
                    lastName: document.getElementById('lastName').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    company: document.getElementById('company').value.trim(),
                    password
                });

                // Signup stores persistent auth by default.
                ElevatexAuth.saveAuth(authData, true);
                submitBtn.textContent = 'Account Created!';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 700);
            } catch (error) {
                alert(error.message || 'Unable to create account. Please try again.');
                submitBtn.textContent = 'Create Account';
                submitBtn.style.background = '';
                submitBtn.disabled = false;
            }
        });

        const socialButtons = document.querySelectorAll('[data-oauth-provider]');
        socialButtons.forEach((button) => {
            button.addEventListener('click', async () => {
                const provider = button.dataset.oauthProvider;
                button.disabled = true;

                try {
                    const authData = await ElevatexAuth.oauthLogin(provider);
                    ElevatexAuth.saveAuth(authData, true);
                    window.location.href = 'index.html';
                } catch (error) {
                    alert(error.message || `Unable to signup with ${provider}`);
                    button.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
